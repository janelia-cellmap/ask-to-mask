# ask-to-mask LoRA finetuning config — Flux2-dev, rank 64, per-image auto norms, full augmentation

model:
  pretrained: "black-forest-labs/FLUX.2-dev"
  lora:
    rank: 64
    alpha: 64
    dropout: 0.0
    # null = use defaults (all attention + FF layers)
    target_modules: null

data:
  data_root: /nrs/cellmap/data
  # norms_csv is loaded as a fallback when auto normalization is disabled
  norms_csv: configs/norms.csv
  organelles:
    - mito
    - er
    - nucleus
    - lipid_droplet
    - plasma_membrane
    - nuclear_envelope
  samples_per_epoch: 4
  min_mask_fraction: 0.01  # skip slices where organelle covers < 1%
  cache_dir: configs
  skip_datasets: []
  # "overlay" = EM + colored organelles, "segmentation" = colored mask on black
  target_mode: segmentation
  # Include voxel resolution in the prompt (e.g. "at 4nm/px resolution")
  include_resolution: true
  # Per-image percentile normalization (computed on each 2D slice)
  auto_norms_per_image: true
  auto_norms_percentile_low: 1.0
  auto_norms_percentile_high: 99.0
  # Training augmentations
  multi_organelle_prob: 0.3       # probability of coloring 2-3 organelles per image
  negative_example_prob: 0.15     # probability of serving a no-organelle example
  prompt_variation: true           # randomly vary prompt wording

training:
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-4
  lr_scheduler: cosine
  lr_warmup_steps: 200
  max_train_steps: 2000
  mixed_precision: bf16
  gradient_checkpointing: true
  seed: 42
  guidance_scale: 3.5

  # Loss weighting: "sigma_sqrt" or "none"
  weighting_scheme: sigma_sqrt

  # Flux2 conditioning: "noise_endpoint" or "concatenate"
  flux2_conditioning: noise_endpoint
  # Blend between EM latents (0) and pure noise (1) for noise_endpoint mode
  flux2_noise_mix: 0.0

  # Validation and checkpointing
  validation_steps: 100
  train_image_log_steps: none
  checkpointing_steps: 500

  # Output
  output_dir: runs/flux2-dev-lora-r64-autonorm-augmented

  # Optimizer
  use_8bit_adam: true

logging:
  report_to: tensorboard
